openapi: 3.0.3
info:
  title: Pet API
  description: Permite obtener la informacion de una mascota.
  version: 1.0.0
tags:
  - name: Pet Information
    description: Pet information Controller
paths:
  /api/pet/{petId}:
    get:
      tags:
        - Pet Information Controller
      summary: Obtener una mascota por ID
      operationId: getPetById
      parameters:
        - name: petId
          in: path
          required: true
          description: ID de la mascota
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: Mascota encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "404":
          description: Pet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: External API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    Pet:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Identificador de la mascota
        name:
          type: string
          description: Nombre de la mascota
        status:
          type: string
          description: Status de la mascota
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Codigo de error
        message:
          type: string
          description: Message de error